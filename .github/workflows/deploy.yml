name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install mkdocs-material
          pip install mkdocs-roamlinks-plugin
      
      - name: Prepare docs structure
        run: |
          mkdir -p docs
          cp *.md docs/ 2>/dev/null || true
          cp -r entities docs/ 2>/dev/null || true
          cp -r concepts docs/ 2>/dev/null || true
          cp -r comparisons docs/ 2>/dev/null || true
          cp -r queries docs/ 2>/dev/null || true
          cp -r raw docs/ 2>/dev/null || true
      
      - name: Create Linear-style mkdocs config
        run: |
          cat > mkdocs.yml << 'EOF'
          site_name: Quokka Wiki
          site_description: 包装设计知识库
          site_author: Ethan Li
          site_url: https://lihuluu.github.io/Quokka-llm-wiki
          docs_dir: docs
          site_dir: site
          
          theme:
            name: material
            language: zh
            palette:
              - scheme: slate
                primary: black
                accent: indigo
                toggle:
                  icon: material/brightness-7
                  name: Switch to light mode
              - scheme: default
                primary: white
                accent: indigo
                toggle:
                  icon: material/brightness-4
                  name: Switch to dark mode
            font:
              text: Inter
              code: JetBrains Mono
            features:
              - navigation.sections
              - navigation.expand
              - navigation.instant
              - search.suggest
              - search.highlight
              - content.code.copy
          
          plugins:
            - search
            - roamlinks:
                open_new_tab: true
          
          markdown_extensions:
            - meta
            - toc:
                permalink: true
            - admonition
            - pymdownx.details
            - pymdownx.superfences
            - pymdownx.highlight:
                anchor_linenums: true
            - tables
            - footnotes
          
          extra_css:
            - stylesheets/linear.css
          
          nav:
            - 首页: index.md
            - 实体:
              - Perplexity: entities/perplexity.md
              - Puma: entities/puma.md
              - Smith & Diction: entities/smith-and-diction.md
            - 概念:
              - AI 品牌设计: concepts/ai-branding.md
              - 单一材料设计: concepts/mono-material-design.md
              - 可持续包装: concepts/sustainable-packaging.md
            - 原始资料:
              - Perplexity 品牌案例: raw/articles/perplexity-brand-redesign-uisdc.md
              - 可持续包装趋势: raw/articles/sustainable-packaging-trends-2025.md
          EOF
      
      - name: Create Linear-style CSS
        run: |
          mkdir -p docs/stylesheets
          printf '%s\n' \
          ':root {' \
          '  --linear-bg: #0e0e10;' \
          '  --linear-bg-secondary: #151518;' \
          '  --linear-border: rgba(255,255,255,0.08);' \
          '  --linear-text: #f7f8f8;' \
          '  --linear-text-secondary: #8a8f98;' \
          '  --linear-accent: #5e6ad2;' \
          '  --linear-radius: 8px;' \
          '}' \
          '' \
          '[data-md-color-scheme="default"] {' \
          '  --linear-bg: #ffffff;' \
          '  --linear-bg-secondary: #f8f9fa;' \
          '  --linear-border: rgba(0,0,0,0.08);' \
          '  --linear-text: #0e0e10;' \
          '  --linear-text-secondary: #6e7681;' \
          '}' \
          '' \
          'body {' \
          '  background-color: var(--linear-bg);' \
          '  color: var(--linear-text);' \
          '  font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;' \
          '  -webkit-font-smoothing: antialiased;' \
          '}' \
          '' \
          '.md-sidebar {' \
          '  background-color: var(--linear-bg);' \
          '  border-right: 1px solid var(--linear-border);' \
          '}' \
          '' \
          '.md-nav__link {' \
          '  color: var(--linear-text-secondary);' \
          '  font-weight: 450;' \
          '  font-size: 14px;' \
          '  border-radius: 6px;' \
          '  margin: 2px 8px;' \
          '  padding: 6px 12px;' \
          '}' \
          '' \
          '.md-nav__link:hover, .md-nav__link--active {' \
          '  color: var(--linear-text);' \
          '  background-color: var(--linear-bg-secondary);' \
          '}' \
          '' \
          '.md-tabs { display: none; }' \
          '' \
          '.md-main, .md-content {' \
          '  background-color: var(--linear-bg);' \
          '}' \
          '' \
          '.md-content__inner {' \
          '  max-width: 720px;' \
          '  margin: 0 auto;' \
          '  padding: 48px 32px;' \
          '}' \
          '' \
          'h1 {' \
          '  font-size: 32px;' \
          '  font-weight: 600;' \
          '  letter-spacing: -0.02em;' \
          '  color: var(--linear-text);' \
          '  margin-bottom: 24px;' \
          '}' \
          '' \
          'h2 {' \
          '  font-size: 22px;' \
          '  font-weight: 600;' \
          '  letter-spacing: -0.01em;' \
          '  margin-top: 48px;' \
          '}' \
          '' \
          'h3 {' \
          '  font-size: 17px;' \
          '  font-weight: 600;' \
          '  margin-top: 32px;' \
          '}' \
          '' \
          'p {' \
          '  font-size: 15px;' \
          '  line-height: 1.7;' \
          '  color: var(--linear-text-secondary);' \
          '}' \
          '' \
          'a {' \
          '  color: #8b9bf0;' \
          '  text-decoration: none;' \
          '}' \
          '' \
          'a:hover { color: #a8b4ff; }' \
          '' \
          'pre {' \
          '  background-color: var(--linear-bg-secondary);' \
          '  border: 1px solid var(--linear-border);' \
          '  border-radius: var(--linear-radius);' \
          '  padding: 16px;' \
          '}' \
          '' \
          'code {' \
          '  font-family: JetBrains Mono, monospace;' \
          '  font-size: 13px;' \
          '  background-color: var(--linear-bg-secondary);' \
          '  border-radius: 4px;' \
          '  padding: 2px 6px;' \
          '}' \
          '' \
          'blockquote {' \
          '  border-left: 2px solid var(--linear-accent);' \
          '  background-color: var(--linear-bg-secondary);' \
          '  border-radius: 0 var(--linear-radius) var(--linear-radius) 0;' \
          '  padding: 12px 20px;' \
          '}' \
          '' \
          'table {' \
          '  border: 1px solid var(--linear-border);' \
          '  border-radius: var(--linear-radius);' \
          '}' \
          '' \
          'th {' \
          '  background-color: var(--linear-bg-secondary);' \
          '  font-weight: 600;' \
          '  font-size: 13px;' \
          '}' \
          '' \
          '::-webkit-scrollbar { width: 6px; }' \
          '::-webkit-scrollbar-thumb {' \
          '  background: var(--linear-border);' \
          '  border-radius: 3px;' \
          '}' \
          > docs/stylesheets/linear.css
      
      - name: Build site
        run: mkdocs build
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
