name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install mkdocs-material
          pip install mkdocs-roamlinks-plugin
      
      - name: Prepare docs structure
        run: |
          mkdir -p docs
          cp *.md docs/ 2>/dev/null || true
          cp -r entities docs/ 2>/dev/null || true
          cp -r concepts docs/ 2>/dev/null || true
          cp -r comparisons docs/ 2>/dev/null || true
          cp -r queries docs/ 2>/dev/null || true
          cp -r raw docs/ 2>/dev/null || true
      
      - name: Create Linear-style mkdocs config
        run: |
          cat > mkdocs.yml << 'EOF'
          site_name: Quokka Wiki
          site_description: 包装设计知识库
          site_author: Ethan Li
          site_url: https://lihuluu.github.io/Quokka-llm-wiki
          docs_dir: docs
          site_dir: site
          
          theme:
            name: material
            language: zh
            palette:
              - scheme: slate
                primary: custom
                accent: custom
                toggle:
                  icon: material/brightness-7
                  name: Switch to light mode
              - scheme: default
                primary: custom
                accent: custom
                toggle:
                  icon: material/brightness-4
                  name: Switch to dark mode
            font:
              text: Inter
              code: JetBrains Mono
            features:
              - navigation.sections
              - navigation.expand
              - navigation.instant
              - search.suggest
              - search.highlight
              - content.code.copy
          
          plugins:
            - search
            - roamlinks:
                open_new_tab: true
          
          markdown_extensions:
            - meta
            - toc:
                permalink: true
            - admonition
            - pymdownx.details
            - pymdownx.superfences
            - pymdownx.highlight:
                anchor_linenums: true
            - tables
            - footnotes
          
          extra_css:
            - stylesheets/linear.css
          
          nav:
            - 首页: index.md
            - 实体:
              - Perplexity: entities/perplexity.md
              - Puma: entities/puma.md
              - Smith & Diction: entities/smith-and-diction.md
            - 概念:
              - AI 品牌设计: concepts/ai-branding.md
              - 单一材料设计: concepts/mono-material-design.md
              - 可持续包装: concepts/sustainable-packaging.md
            - 原始资料:
              - Perplexity 品牌案例: raw/articles/perplexity-brand-redesign-uisdc.md
              - 可持续包装趋势: raw/articles/sustainable-packaging-trends-2025.md
          EOF
      
      - name: Create Linear-style CSS
        run: |
          mkdir -p docs/stylesheets
          cat > docs/stylesheets/linear.css << 'CSSEND'
          :root {
            --linear-bg: #0e0e10;
            --linear-bg-secondary: #151518;
            --linear-border: rgba(255, 255, 255, 0.08);
            --linear-text: #f7f8f8;
            --linear-text-secondary: #8a8f98;
            --linear-accent: #5e6ad2;
            --linear-radius: 8px;
          }
          
          [data-md-color-scheme="default"] {
            --linear-bg: #ffffff;
            --linear-bg-secondary: #f8f9fa;
            --linear-border: rgba(0, 0, 0, 0.08);
            --linear-text: #0e0e10;
            --linear-text-secondary: #6e7681;
