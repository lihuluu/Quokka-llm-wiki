name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install mkdocs-material
          pip install mkdocs-roamlinks-plugin
      
      - name: Prepare docs structure
        run: |
          mkdir -p docs
          cp *.md docs/ 2>/dev/null || true
          cp -r entities docs/ 2>/dev/null || true
          cp -r concepts docs/ 2>/dev/null || true
          cp -r comparisons docs/ 2>/dev/null || true
          cp -r queries docs/ 2>/dev/null || true
          cp -r raw docs/ 2>/dev/null || true
      
      - name: Create mkdocs config
        run: |
          cat > mkdocs.yml << 'EOF'
          site_name: Quokka Wiki
          site_description: 包装设计知识库
          site_author: Ethan Li
          site_url: https://lihuluu.github.io/Quokka-llm-wiki
          docs_dir: docs
          site_dir: site
          theme:
            name: material
            language: zh
            palette:
              # 深色模式作为默认（更酷）
              - scheme: slate
                primary: teal
                accent: amber
                toggle:
                  icon: material/brightness-7
                  name: 切换到浅色模式
              # 浅色模式切换
              - scheme: default
                primary: teal
                accent: amber
                toggle:
                  icon: material/brightness-4
                  name: 切换到深色模式
            features:
              - navigation.tabs
              - navigation.sections
              - navigation.top
              - search.suggest
              - search.highlight
              - content.code.copy
            font:
              text: Noto Sans SC
              code: JetBrains Mono
          plugins:
            - search
            - roamlinks:
                open_new_tab: true
          markdown_extensions:
            - meta
            - toc:
                permalink: true
            - admonition
            - pymdownx.details
            - pymdownx.superfences:
                custom_fences:
                  - name: mermaid
                    class: mermaid
                    format: !!python/name:pymdownx.superfences.fence_code_format
            - pymdownx.tabbed:
                alternate_style: true
            - pymdownx.inlinehilite
            - pymdownx.snippets
            - pymdownx.highlight:
                anchor_linenums: true
                line_spans: __span
                pygments_lang_class: true
            - tables
            - footnotes
          extra:
            social:
              - icon: fontawesome/brands/github
                link: https://github.com/lihuluu
            generator: false
          nav:
            - 首页: index.md
            - 实体:
              - Perplexity: entities/perplexity.md
              - Puma: entities/puma.md
              - Smith & Diction: entities/smith-and-diction.md
            - 概念:
              - AI 品牌设计: concepts/ai-branding.md
              - 单一材料设计: concepts/mono-material-design.md
              - 可持续包装: concepts/sustainable-packaging.md
            - 原始资料:
              - Perplexity 品牌案例: raw/articles/perplexity-brand-redesign-uisdc.md
              - 可持续包装趋势: raw/articles/sustainable-packaging-trends-2025.md
          EOF
      
      - name: Build site
        run: mkdocs build
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
