site_name: Quokka Wiki
site_description: 包装设计知识库
site_author: Ethan Li
site_url: https://lihuluu.github.io/Quokka-llm-wiki

theme:
  name: material
  language: zh
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight

plugins:
  - search
  - roamlinks:
      open_new_tab: true

markdown_extensions:
  - meta
  - toc:
      permalink: true
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables

nav:
  - 首页: index.md
  - 实体:
    - Perplexity: entities/perplexity.md
    - Puma: entities/puma.md
    - Smith & Diction: entities/smith-and-diction.md
  - 概念:
    - AI 品牌设计: concepts/ai-branding.md
    - 单一材料设计: concepts/mono-material-design.md
    - 可持续包装: concepts/sustainable-packaging.md
  - 原始资料:
    - Perplexity 品牌案例: raw/articles/perplexity-brand-redesign-uisdc.md
    - 可持续包装趋势: raw/articles/sustainable-packaging-trends-2025.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/lihuluu
